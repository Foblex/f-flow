<f-flow fDraggable (fLoaded)="loaded()">
  <f-canvas fZoom>
    @for (connection of connections(); track connection.id) {
    <f-connection
      [fConnectionId]="connection.id"
      [fOutputId]="connection.source"
      [fInputId]="connection.target"
      [fOutputSide]="connectionSides().source"
      [fInputSide]="connectionSides().target"
      fType="segment"
      fBehavior="fixed"
    >
      <svg
        viewBox="0 0 700 700"
        fMarker
        [type]="markerType.START"
        class="connection-marker"
        [height]="5"
        [width]="5"
        [refX]="2.5"
        [refY]="2.5"
        markerUnits="strokeWidth"
      >
        <circle cx="350" cy="350" r="350" />
      </svg>
      <svg
        viewBox="0 0 6 7"
        fMarker
        [type]="markerType.END"
        class="connection-marker"
        [height]="7"
        [width]="6"
        [refX]="5.5"
        [refY]="3.5"
        markerUnits="strokeWidth"
        orient="auto"
      >
        <path d="M0.000391006 0L6 3.5L0.000391006 7L0.000391006 0Z" />
      </svg>
    </f-connection>
    } @for (node of nodes(); track node.id) {
    <div
      fNode
      [fNodeId]="node.id"
      [fNodePosition]="node.position!"
      fDragHandle
      fNodeInput
      [fInputId]="node.id"
      fNodeOutput
      [fOutputId]="node.id"
    >
      {{ node.label }}
    </div>
    }
  </f-canvas>
</f-flow>
<example-toolbar>
  <example-select label="Direction" [(value)]="direction" [options]="directions" />
  <example-select label="Algorithm" [(value)]="algorithm" [options]="algorithms" />
  <example-select label="Spacing" [(value)]="spacing" [options]="spacings" />
  <button class="f-button primary" (click)="addNode()">Add Node</button>
</example-toolbar>
