<f-flow fDraggable (fLoaded)="onLoaded()">
  <f-canvas>
    <f-connection
      [fReassignDisabled]="true"
      fOutputId="1"
      fInputId="2"
      fBehavior="fixed"
      fType="segment"
      class="gradient-color"
    >
      <f-connection-gradient
        [fStartColor]="startColor()"
        [fEndColor]="endColor()"
      ></f-connection-gradient>
    </f-connection>
    <div
      fNode
      fDragHandle
      [fNodePosition]="{ x: 0, y: 0 }"
      fNodeOutput
      fOutputId="1"
      fOutputConnectableSide="bottom"
    >
      I'm a node
    </div>
    <div
      fNode
      fDragHandle
      [fNodePosition]="{ x: 300, y: 0 }"
      fNodeInput
      fInputId="2"
      fInputConnectableSide="top"
    >
      I'm a node
    </div>

    <f-connection [fReassignDisabled]="true" fOutputId="3" fInputId="4" fBehavior="floating">
    </f-connection>
    <div
      fNode
      fDragHandle
      [fNodePosition]="{ x: 0, y: 150 }"
      fNodeOutput
      fOutputId="3"
      fOutputConnectableSide="right"
    >
      I'm a node
    </div>
    <div
      fNode
      fDragHandle
      [fNodePosition]="{ x: 300, y: 150 }"
      fNodeInput
      fInputId="4"
      fInputConnectableSide="left"
    >
      I'm a node
    </div>
  </f-canvas>
</f-flow>

<div class="examples-toolbar">
  <mat-form-field>
    <mat-label>Gradient Start</mat-label>
    <mat-select [(value)]="startColor">
      @for (option of colorOptions; track option.value) {
        <mat-option [value]="option.value">
          <span class="color-option">
            <span class="color-swatch" [style.background]="option.value"></span>
            {{ option.label }}
          </span>
        </mat-option>
      }
    </mat-select>
  </mat-form-field>

  <mat-form-field>
    <mat-label>Gradient End</mat-label>
    <mat-select [(value)]="endColor">
      @for (option of colorOptions; track option.value) {
        <mat-option [value]="option.value">
          <span class="color-option">
            <span class="color-swatch" [style.background]="option.value"></span>
            {{ option.label }}
          </span>
        </mat-option>
      }
    </mat-select>
  </mat-form-field>
</div>
