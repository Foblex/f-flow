@if (routerLink() !== null) {
  <a [routerLink]="routerLink()!" class="brand-link" [attr.aria-label]="ariaLabel()">
    <img [src]="logo()" class="logo" [alt]="logoAlt()" width="24" height="24"/>
    <span class="title">{{ title() }}</span>
  </a>
} @else {
  <a [href]="href()" class="brand-link" [attr.aria-label]="ariaLabel()">
    <img [src]="logo()" class="logo" [alt]="logoAlt()" width="24" height="24"/>
    <span class="title">{{ title() }}</span>
  </a>
}
