<div class="doc-content" [innerHTML]="value()"></div>
@if (origin(); as pageOrigin) {
  <aside class="origin-link" role="note">
    <span class="origin-link-icon" aria-hidden="true"></span>
    <div class="origin-link-content">
      <span class="origin-link-label">{{ pageOrigin.label }}</span>
      <a class="origin-link-url f-text-link f-text-link-primary"
         [href]="pageOrigin.url"
         target="_blank"
         rel="noopener noreferrer nofollow">{{ pageOrigin.url }}</a>
    </div>
  </aside>
}
@if (value()) {
  <markdown-footer />
}
