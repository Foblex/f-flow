@if (emptyNavigation) {
  <f-brand-link class="empty-navigation-title"
                [routerLink]="''"
                [title]="title"
                [logo]="image" />
} @else {
  <div class="portal-title">
    <button hamburger-button></button>
    <div class="title text-ellipsis">{{ title }}</div>
  </div>
}

@if (config.search) {
  <f-search-button [configuration]="config.searchConfiguration"></f-search-button>
  <div class="divider search-divider"></div>
}

<div class="collapsable-row" #container>
  <div #target class="target" [class.hidden]="initialized() && overflowed()">
    @if (config.navigation) {
      <inline-menu />
      <div class="divider"></div>
    }

    <button theme-button></button>
    <div class="divider"></div>
    <media-links />
  </div>

  <div class="fallback" [class.hidden]="!initialized() || !overflowed()">
    <dropdown-menu />
  </div>
</div>
