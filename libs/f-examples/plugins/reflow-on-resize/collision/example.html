<f-flow fDraggable (fFullRendered)="loaded()">
  <f-canvas fZoom>
    <div fNode fDragHandle [fNodePosition]="{ x: 0, y: 0 }">
      <div fResizeHandle fResizeHandleType="left"></div>
      <div fResizeHandle fResizeHandleType="top"></div>
      <div fResizeHandle fResizeHandleType="right"></div>
      <div fResizeHandle fResizeHandleType="bottom"></div>
      <div class="node-content">Source</div>
    </div>

    <div fNode fDragHandle [fNodePosition]="{ x: 0, y: 150 }">
      <div class="node-content">Node</div>
    </div>

    <div fNode fDragHandle [fNodePosition]="{ x: 200, y: 150 }">
      <div class="node-content">Node</div>
    </div>

    <div fNode fDragHandle fReflowIgnore [fNodePosition]="{ x: 0, y: 400 }">
      <div class="node-content">fReflowIgnore</div>
    </div>
  </f-canvas>
</f-flow>

<f-toolbar>
  <f-select [(value)]="collision" [options]="collisions" label="Collision" />
</f-toolbar>
