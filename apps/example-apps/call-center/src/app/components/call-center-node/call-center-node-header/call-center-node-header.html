@let params = metadata[type()];

<div class="node-icon-badge" [style.background-color]="params?.color">
  <mat-icon>{{ params?.icon }}</mat-icon>
</div>

<div class="node-header-text">
  <div class="node-header-title">{{ params?.name }}</div>
  @if (description()) {
  <div class="node-header-subtitle">{{ description() }}</div>
  }
</div>

<div class="flex-space"></div>
@if (params?.isExpandable) {
<button
  fDragBlocker
  class="node-toggle-button"
  [class.expanded]="expanded()"
  [attr.aria-label]="(expanded() ? 'Collapse ' : 'Expand ') + params.name"
  (click)="toggle()"
>
  <mat-icon>expand_more</mat-icon>
</button>
}
