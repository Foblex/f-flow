<section-head kicker="Features" title="What Foblex Flow gives you out of the box." />

<div class="grid">
  @for (card of cards; track card.title) {
  <article class="card">
    <div class="icon" aria-hidden="true">
      @switch (card.icon) { @case ('layout') {
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.75"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <rect x="3" y="3" width="7" height="7" rx="1" />
        <rect x="14" y="3" width="7" height="7" rx="1" />
        <rect x="3" y="14" width="7" height="7" rx="1" />
        <rect x="14" y="14" width="7" height="7" rx="1" />
      </svg>
      } @case ('move') {
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.75"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M5 9l-3 3 3 3" />
        <path d="M9 5l3-3 3 3" />
        <path d="M15 19l-3 3-3-3" />
        <path d="M19 9l3 3-3 3" />
        <path d="M2 12h20" />
        <path d="M12 2v20" />
      </svg>
      } @case ('gradient') {
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.75"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M3 18c4 0 4-12 8-12s4 12 8 12" />
      </svg>
      } @case ('map') {
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.75"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M3 6l6-2 6 2 6-2v14l-6 2-6-2-6 2z" />
        <path d="M9 4v16" />
        <path d="M15 6v16" />
      </svg>
      } @case ('magnet') {
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.75"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M6 3v9a6 6 0 0 0 12 0V3" />
        <path d="M6 3h4v5H6z" />
        <path d="M14 3h4v5h-4z" />
      </svg>
      } @case ('zap') {
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.75"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M13 2L4 14h7l-1 8 9-12h-7z" />
      </svg>
      } }
    </div>
    @if (card.isNew) {
    <span class="badge">New</span>
    }
    <h3>{{ card.title }}</h3>
    <p>{{ card.description }}</p>
  </article>
  }
</div>
